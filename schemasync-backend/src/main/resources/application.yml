server:
  port: 8999
  servlet:
    context-path: /

spring:
  application:
    name: schemasync-backend

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 200MB

# 日志配置
logging:
  level:
    root: INFO
    com.schemasync: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/schemasync.log
    max-size: 100MB
    max-history: 30

# SchemaSync自定义配置
schemasync:
  # 数据源配置文件路径
  # 支持相对路径和绝对路径:
  # - 相对路径: 相对于用户主目录 (~/.schemasync/)
  # - 绝对路径: 以 / 或 C: 开头的完整路径
  # 示例:
  #   schemasync-config.json                    -> ~/.schemasync/schemasync-config.json
  #   ./config/my-config.json                   -> ~/.schemasync/config/my-config.json
  #   D:/configs/schemasync-config.json         -> D:/configs/schemasync-config.json
  # config-file: schemasync-config.json  # 注释掉,使用代码默认值

  # 默认输出目录(导出文件保存位置)
  default-output-dir: ./output

  # 最大连接池大小(每个数据源)
  max-pool-size: 10

  # 连接超时时间(秒)
  connection-timeout: 30

  # 最小空闲连接数
  min-idle: 2

  # 连接最大存活时间(分钟)
  max-lifetime: 30

  # 是否启用CLI模式(保留,当前未使用)
  cli-enabled: true

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Swagger配置
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
